spring.application.name=skripsi

spring.datasource.url=${DB_URL}
spring.datasource.driverClassName=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000

spring.datasource.hikari.keepalive-time=60000

spring.datasource.hikari.idle-timeout=0

spring.datasource.hikari.max-lifetime=840000

spring.datasource.hikari.connection-test-query=SELECT 1


spring.jackson.property-naming-strategy=LOWER_CAMEL_CASE

spring.security.user.name=test
spring.security.user.password=test

jwt.refresh.secret=${REFRESH_SECRET}
jwt.access.secret=${ACCESS_SECRET}
jwt.refresh.expiration=${REFRESH_EXP}
jwt.access.expiration=${ACCESS_EXP}

spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

server.port=8888
server.address=0.0.0.0

minio.endpoint=${MINIO_ENDPOINT}
minio.proxyEndpoint=${MINIO_PROXY_ENDPOINT}
minio.accessKey=${MINIO_ACCESS_KEY}
minio.secretKey=${MINIO_SECRET_KEY}
minio.bucketName=${MINIO_BUCKET_NAME}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# --- Mail (password reset) --------------------------------------------------
# Defaults target a local SMTP catcher (Mailpit/MailHog on :1025) so local dev
# works with no auth. Production overrides these via env, e.g. for Gmail:
#   MAIL_HOST=smtp.gmail.com  MAIL_PORT=587
#   MAIL_USERNAME=you@gmail.com  MAIL_PASSWORD=<16-char App Password>
#   MAIL_SMTP_AUTH=true  MAIL_SMTP_STARTTLS=true
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.from=${MAIL_FROM:no-reply@internview.app}
# Base URL of the SPA -- the reset link points here: <url>/reset-password?token=...
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
# Password-reset token lifetime, in minutes.
app.reset-token.expiration-minutes=${RESET_TOKEN_EXP_MINUTES:30}